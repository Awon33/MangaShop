<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPal Payment - MangaShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Mochiy+Pop+One&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --manga-blue: #0070ba;
            --manga-light-blue: #009cde;
            --manga-yellow: #ffd32d;
            --light-bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #2d3748;
            --text-muted: #718096;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-dark);
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .payment-card {
            background: white;
            border-radius: 25px;
            padding: 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
            position: relative;
            text-align: center;
            max-width: 500px;
            margin: 2rem auto;
        }

        .payment-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--manga-blue), var(--manga-light-blue));
            border-radius: 25px 25px 0 0;
        }

        .btn-paypal {
            background: linear-gradient(45deg, var(--manga-blue), var(--manga-light-blue));
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 112, 186, 0.4);
        }

        .btn-paypal:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 112, 186, 0.6);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="payment-card">
                <!-- Your existing design -->
                
                <!-- Add this form -->
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-paypal w-100">
                        <i class="bi bi-paypal me-2"></i>PAY WITH PAYPAL - ${{ order.total_amount }}
                    </button>
                </form>

                <!-- {% if messages %}
                    <div class="mt-3">
                        {% for message in messages %}
                            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    </div>
                {% endif %} -->
                
                <a href="{% url 'orders:checkout' %}" class="btn btn-outline-secondary w-100 mt-3">
                    <i class="bi bi-arrow-left me-2"></i>BACK TO CHECKOUT
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
