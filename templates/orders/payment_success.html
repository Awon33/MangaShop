<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful - MangaShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Mochiy+Pop+One&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --manga-red: #ff2e4c;
            --manga-blue: #00a8ff;
            --manga-yellow: #ffd32d;
            --manga-purple: #9c27ff;
            --manga-pink: #ff2e8b;
            --manga-orange: #ff6b35;
            --light-bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #2d3748;
            --text-muted: #718096;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-dark);
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .success-container {
            background: white;
            border-radius: 25px;
            padding: 4rem 3rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
            position: relative;
            text-align: center;
            max-width: 600px;
            margin: 2rem auto;
        }

        .success-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--manga-red), var(--manga-pink), var(--manga-orange));
            border-radius: 25px 25px 0 0;
        }

        .btn-manga {
            background: linear-gradient(45deg, var(--manga-red), var(--manga-pink));
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 46, 76, 0.4);
        }

        .btn-manga:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 46, 76, 0.6);
            color: white;
        }

        .btn-manga-outline {
            border: 2px solid var(--manga-red);
            color: var(--manga-red);
            background: transparent;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-manga-outline:hover {
            background: var(--manga-red);
            color: white;
            transform: translateY(-3px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
        <div class="success-container">
            <i class="bi bi-check-circle-fill floating" style="font-size: 5rem; background: linear-gradient(45deg, #28a745, #20c997); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
            <h1 class="mt-4" style="font-family: 'Mochiy Pop One', sans-serif; background: linear-gradient(45deg, var(--manga-red), var(--manga-pink), var(--manga-orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                ORDER SUCCESSFUL!
            </h1>
            <p class="lead mb-4" style="color: var(--text-muted); font-size: 1.2rem;">Thank you for your order.</p>
            
            <div class="mt-4">
                <a href="{% url 'home' %}" class="btn btn-manga me-3">
                    <i class="bi bi-house me-2"></i>BACK TO HOME
                </a>
                <a href="{% url 'product_list' %}" class="btn btn-manga-outline">
                    <i class="bi bi-compass me-2"></i>CONTINUE SHOPPING
                </a>
            </div>
        </div>
    </div>
</body>
</html>
